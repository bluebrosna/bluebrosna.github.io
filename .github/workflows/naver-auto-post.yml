name: Post to Naver Blog (Auto)

on:
  push:
    branches:
      - main
    paths:
      - 'content/**'
  workflow_dispatch:
    inputs:
      post_title:
        description: '포스트 제목'
        required: true
        type: string
      post_file:
        description: 'content/ 폴더의 파일명'
        required: true
        type: string

jobs:
  convert-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NAVER_ID: ${{ secrets.NAVER_ID }}
      NAVER_PW: ${{ secrets.NAVER_PW }}
      NAVER_COOKIE_NID_AUT: ${{ secrets.NAVER_COOKIE_NID_AUT }}
      NAVER_COOKIE_NID_SES: ${{ secrets.NAVER_COOKIE_NID_SES }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Playwright Chromium
        run: |
          npx playwright install chromium
        shell: bash

      - name: Install Dependencies
        run: |
          npm install
          npm install playwright

      - name: Determine post file (push event)
        if: github.event_name == 'push'
        id: detect_file
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'content/**' | head -1)
          if [ -z "$CHANGED" ]; then
            echo "No content file changed, skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            TITLE="$(basename "${CHANGED%.*}")"
            echo "post_file=$CHANGED" >> $GITHUB_OUTPUT
            echo "post_title=$TITLE" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Convert Markdown to Naver HTML
        if: github.event_name == 'workflow_dispatch' || steps.detect_file.outputs.skip != 'true'
        run: |
          FILE="${{ inputs.post_file || steps.detect_file.outputs.post_file }}"
          node convert-quartz.mjs "$FILE"
        env:
          POST_TITLE: ${{ inputs.post_title || steps.detect_file.outputs.post_title }}

      - name: Verify HTML Output
        if: github.event_name == 'workflow_dispatch' || steps.detect_file.outputs.skip != 'true'
        run: |
          echo "=== 변환 결과 ==="
          echo "제목: $(cat naver_blog_title.txt)"
          echo "크기: $(wc -c < naver_blog_content.html) bytes"

      - name: Post to Naver Blog
        if: (github.event_name == 'workflow_dispatch' || steps.detect_file.outputs.skip != 'true') && env.NAVER_ID != ''
        run: |
          echo "=== 네이버 블로그 자동 게시 시작 ==="
          node naver-auto-post.mjs
        shell: bash

      - name: Upload HTML as Artifact
        if: (github.event_name == 'workflow_dispatch' || steps.detect_file.outputs.skip != 'true') && env.NAVER_ID == ''
        uses: actions/upload-artifact@v7
        with:
          name: naver-blog-html-${{ github.run_id }}
          path: |
            naver_blog_title.txt
            naver_blog_content.html
          retention-days: 7

      - name: Upload Naver debug artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: naver-debug-${{ github.run_id }}
          path: naver-debug/
          retention-days: 7
