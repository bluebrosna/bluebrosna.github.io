name: Auto Post to Naver Blog

on:
  workflow_dispatch:
    inputs:
      post_title:
        description: '포스트 제목 (Post Title)'
        required: true
        type: string
      post_file:
        description: 'content/ 폴더의 파일명 (예: ai-assistant-daily-life-2026-05-16.md)'
        required: true
        type: string

jobs:
  convert-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/chrome.list
          apt-get update -qq
          apt-get install -y -qq google-chrome-stable > /dev/null 2>&1

      - name: Install Dependencies
        run: |
          npm install
          npm install puppeteer-core jsdom

      - name: Convert Markdown to Naver HTML
        run: |
          node convert-quartz.mjs ${{ inputs.post_file }}
        env:
          POST_TITLE: ${{ inputs.post_title }}

      - name: Verify HTML Output
        run: |
          if [ -f naver_blog_content.html ]; then
            echo "✅ HTML 변환 완료"
            echo "파일 크기: $(wc -c < naver_blog_content.html) bytes"
            head -c 500 naver_blog_content.html
          else
            echo "❌ HTML 파일이 생성되지 않았습니다"
            exit 1
          fi

      - name: Display Instructions
        run: |
          echo ""
          echo "========================================"
          echo "🎯 다음 단계: 수동으로 네이버 블로그에 게시"
          echo "========================================"
          echo ""
          echo "1. 제목 파일 확인:"
          cat naver_blog_title.txt
          echo ""
          echo "2. HTML 내용 확인 (첫 500자):"
          head -c 500 naver_blog_content.html
          echo ""
          echo ""
          echo "3. https://blog.naver.com/bluebrosna 접속"
          echo "4. 글쓰기 → 내용 붙여넣기 → 발행"
          echo ""
          echo "⚠️ 참고: 네이버는 공식 API가 없어 완전한 자동화가 어렵습니다"
          echo "   완전 자동화를 원하시면 BrowserBase 등의付费 서비스検討"
          echo ""

      - name: Upload HTML as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: naver-blog-html-${{ inputs.post_file }}
          path: |
            naver_blog_title.txt
            naver_blog_content.html
          retention-days: 7
